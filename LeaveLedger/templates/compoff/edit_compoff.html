{% extends "base.html" %}
{% block title %}Edit Comp-Off{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow-sm border-0">
<div class="card-body p-4">

<h5 class="mb-3 text-primary">Edit Comp-Off</h5>

<form method="post">
{% csrf_token %}

<div class="mb-3">
    <label class="form-label">Worked Date</label>
    <input type="date"
           name="worked_date"
           class="form-control"
           value="{{ compoff.work_date|date:'Y-m-d' }}"
           required>
</div>

<div class="mb-3">
    <label class="form-label">Hours Worked</label>
    <input type="number"
           name="hours_worked"
           min="8"
           class="form-control"
           value="{{ compoff.hours_worked }}"
           required>
</div>

<div class="d-flex justify-content-between">
    <a href="{% url 'apply_compoff' %}" class="btn btn-light">
        Cancel
    </a>

    <button class="btn btn-primary">
        Update Comp-Off
    </button>
</div>

</form>

</div>
</div>

</div>
</div>
{% endblock %}
